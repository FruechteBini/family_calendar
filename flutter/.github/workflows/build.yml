name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
      - run: flutter pub get
        working-directory: flutter
      - run: flutter build web --wasm --release
        working-directory: flutter
      - uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: flutter/build/web

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
      - run: flutter pub get
        working-directory: flutter
      - run: flutter build apk --release
        working-directory: flutter
      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: flutter/build/app/outputs/flutter-apk/app-release.apk

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
      - run: flutter pub get
        working-directory: flutter
      - run: flutter build ios --release --no-codesign
        working-directory: flutter

  deploy-web:
    needs: build-web
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web-build
      # Deploy to your server - customize this step
      # Example: copy to backend/app/static/ or deploy to hosting
      - run: echo "Deploy web build to production server"
