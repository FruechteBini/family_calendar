name: familienkalender
description: Familienkalender - Cross-Platform Family Calendar App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP
  dio: ^5.4.3+1

  # Routing
  go_router: ^14.2.0

  # Local Database
  drift: ^2.18.0
  sqlite3_flutter_libs: ^0.5.21
  path_provider: ^2.1.3
  path: ^1.9.0

  # Secure Storage
  flutter_secure_storage: ^10.0.0

  # Background Sync
  workmanager: ^0.9.0

  # Speech Recognition
  speech_to_text: ^7.3.0

  # Image Loading
  cached_network_image: ^3.3.1

  # Fonts
  google_fonts: ^6.2.1

  # UI Utilities
  intl: ^0.20.0
  collection: ^1.18.0
  uuid: ^4.4.0

  # Drag and Drop
  flutter_reorderable_grid_view: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.18.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  generate: true
